<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="经典2048数字合成游戏，支持键盘、触屏滑动与按钮操作，带平滑合并动画。">
    <meta name="theme-color" content="#faf8ef">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23edc22e'/%3E%3Ctext x='50' y='63' font-size='26' font-family='Arial, sans-serif' font-weight='bold' fill='%23f9f6f2' text-anchor='middle'%3E2048%3C/text%3E%3C/svg%3E">
    <title>2048(Made by Jinhong270)</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/board.css">
    <link rel="stylesheet" href="css/controls.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="title-group">
                <h1 class="title">2048</h1>
                <p class="subtitle">合并相同数字，冲击 2048</p>
            </div>
            <div class="header-actions">
                <div class="score-box">
                    <span class="score-label">分数</span>
                    <span class="score-value" id="scoreValue">0</span>
                </div>
                <div class="score-box">
                    <span class="score-label">最高分</span>
                    <span class="score-value" id="bestValue">0</span>
                </div>
                <button class="reset-btn" id="resetBtn">新游戏</button>
            </div>
        </header>

        <main class="game-wrapper">
            <div class="board-section">
                <div class="board" id="board">
                    <div class="grid" id="grid"></div>
                    <div class="tiles-layer" id="tilesLayer"></div>
                </div>
            </div>
            <div class="controls">
                <div class="dpad">
                    <button class="btn btn-up" data-dir="up" aria-label="向上移动">▲</button>
                    <button class="btn btn-left" data-dir="left" aria-label="向左移动">◀</button>
                    <button class="btn btn-right" data-dir="right" aria-label="向右移动">▶</button>
                    <button class="btn btn-down" data-dir="down" aria-label="向下移动">▼</button>
                </div>
            </div>
        </main>
    </div>

    <div id="winModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="winModalMsg">
        <div class="modal-content">
            <p id="winModalMsg">恭喜！你达到了 2048！</p>
            <div class="modal-buttons">
                <button id="continueBtn" class="modal-btn">继续游戏</button>
                <button id="newGameFromWinBtn" class="modal-btn">新游戏</button>
            </div>
        </div>
    </div>

    <div id="gameOverModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="gameOverModalMsg">
        <div class="modal-content">
            <p id="gameOverModalMsg">游戏结束！没有可移动的格子了。</p>
            <div class="modal-buttons">
                <button id="newGameFromOverBtn" class="modal-btn">新游戏</button>
            </div>
        </div>
    </div>

    <div id="liveRegion" class="visually-hidden" aria-live="polite"></div>

    <script src="js/logic.js"></script>
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
